<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luna</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700&family=Space+Mono:wght@400;700&display=swap');

:root {
  --rose:     #f472b6;
  --rose-dim: #9d174d;
  --violet:   #a78bfa;
  --indigo:   #6366f1;
  --surface:  rgba(10, 4, 22, 0.82);
  --glass:    rgba(255,255,255,0.04);
  --border:   rgba(167,139,250,0.18);
  --text:     #f5f0ff;
  --muted:    rgba(245,240,255,0.4);
  --glow-pk:  rgba(244,114,182,0.35);
  --glow-vl:  rgba(167,139,250,0.25);
  --radius:   18px;
  --font-ui:  'DM Sans', sans-serif;
  --font-mono:'Space Mono', monospace;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background: transparent;
  overflow: hidden;
  font-family: var(--font-ui);
  color: var(--text);
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

#app {
  width: 100vw; height: 100vh;
  position: relative;
  background: transparent;
}

#drag {
  position: absolute; top:0; left:0; right:0; height:28px;
  -webkit-app-region: drag; z-index: 999;
}

#win-btns {
  position: absolute; top:9px; right: 10px;
  display:flex; gap:5px; z-index:1000;
  -webkit-app-region: no-drag;
  opacity: 0;
  transition: opacity 0.3s;
}
#win-btns:hover, #app:hover #win-btns { opacity: 1; }
.wb-btn {
  width:10px; height:10px; border-radius:50%;
  border:none; cursor:pointer; transition:opacity 0.15s;
}
.wb-close { background:#ff5f57; }
.wb-mini  { background:#553e61; }
.wb-max   { background:#52366d; }

#canvas-wrap { position: absolute; inset:0; }
#three-canvas { display:block; width:100%; height:100%; }
#particles-canvas {
  position: absolute; inset:0;
  pointer-events: none; z-index: 0;
  opacity: 0.55;
}

#loader {
  position: absolute; inset:0;
  background: linear-gradient(160deg, #0a0416 0%, #0e0626 60%, #13082e 100%);
  display: flex; flex-direction:column;
  align-items: center; justify-content: center;
  gap: 20px; z-index: 200;
  transition: opacity 0.7s ease, visibility 0.7s;
}
#loader.hidden { opacity:0; visibility:hidden; pointer-events:none; }

.loader-ring { position: relative; width: 56px; height: 56px; }
.loader-ring::before, .loader-ring::after {
  content:''; position:absolute; inset:0;
  border-radius: 50%; border: 2px solid transparent;
}
.loader-ring::before {
  border-top-color: var(--rose); border-right-color: var(--violet);
  animation: spin 1.1s linear infinite;
}
.loader-ring::after {
  inset: 6px; border-bottom-color: var(--indigo);
  animation: spin 0.75s linear infinite reverse;
}
@keyframes spin { to { transform: rotate(360deg); } }

#load-text {
  font-family: var(--font-mono); font-size: 11px;
  letter-spacing: 0.2em; color: var(--rose); text-transform: uppercase;
}
#load-bar-wrap {
  width: 160px; height: 2px;
  background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden;
}
#load-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--rose), var(--violet));
  width: 0%; transition: width 0.3s ease; border-radius: 4px;
}

/* Bubble de fala */
#bubble {
  position: absolute;
  bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(6px);
  max-width: 86%;
  background: var(--surface);
  border: 1px solid var(--border);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-radius: var(--radius) var(--radius) var(--radius) 4px;
  padding: 10px 16px;
  font-size: 13.5px; line-height: 1.55; text-align: left;
  opacity: 0; pointer-events: none; z-index: 20;
  transition: opacity 0.25s ease, transform 0.25s ease;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
#bubble.show {
  opacity: 1; transform: translateX(-50%) translateY(0);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 24px var(--glow-vl);
}
#bubble::after {
  content: '';
  position: absolute; bottom: -6px; left: 18px;
  width: 12px; height: 12px;
  background: var(--surface);
  border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
  clip-path: polygon(0 0, 100% 0, 100% 100%);
}
#bubble::before {
  content: 'Luna'; display: block;
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: 0.15em; color: var(--rose);
  text-transform: uppercase; margin-bottom: 5px;
}

/* Listen HUD */
#listen-hud {
  position: absolute;
  bottom: 80px; left: 50%;
  transform: translateX(-50%);
  display: flex; align-items: center; gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 8px 18px;
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--rose);
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease;
  z-index: 25;
}
#listen-hud.show { opacity: 1; }

.hud-bars { display:flex; align-items:center; gap:2px; }
.hb { width:3px; border-radius:2px; background: var(--rose); animation: hbp 0.45s ease-in-out infinite; }
.hb:nth-child(1){height:5px;}  .hb:nth-child(2){height:9px;animation-delay:.08s;}
.hb:nth-child(3){height:13px;animation-delay:.16s;} .hb:nth-child(4){height:9px;animation-delay:.24s;}
.hb:nth-child(5){height:5px;animation-delay:.32s;}
@keyframes hbp { 0%,100%{transform:scaleY(0.4);} 50%{transform:scaleY(1);} }

.hud-spin { display:none; }
.hud-spin svg { animation: spin 0.8s linear infinite; }

#listen-hud.recording  .hud-bars { display:flex; }
#listen-hud.recording  .hud-spin { display:none; }
#listen-hud.processing .hud-bars { display:none; }
#listen-hud.processing .hud-spin { display:flex; }
#listen-hud.processing { border-color: rgba(167,139,250,0.3); color: var(--violet); }
#listen-hud.processing .hb { background: var(--violet); }

/* Thinking dots */
#thinking {
  position: absolute; bottom: 80px; left: 50%;
  transform: translateX(-50%);
  display: flex; align-items:center; gap: 5px;
  background: var(--surface); border: 1px solid var(--border);
  backdrop-filter: blur(16px); border-radius: 24px;
  padding: 7px 14px; font-size: 12px; color: var(--muted);
  opacity: 0; pointer-events: none; transition: opacity 0.25s; z-index: 21;
}
#thinking.show { opacity:1; }
.td { width:6px; height:6px; border-radius:50%; background: var(--violet); }
.td:nth-child(1){animation:tdp 1s .0s ease-in-out infinite;}
.td:nth-child(2){animation:tdp 1s .15s ease-in-out infinite;}
.td:nth-child(3){animation:tdp 1s .3s ease-in-out infinite;}
@keyframes tdp{0%,80%,100%{opacity:.2;transform:scale(0.7);}40%{opacity:1;transform:scale(1.1);}}

/* Emotion tag */
#emo-tag {
  position: absolute; top: 38px; right: 12px;
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted); opacity: 0; transition: opacity 0.4s; z-index: 20;
}
#emo-tag.show { opacity: 1; }

/* Status dot */
#status-dot {
  position: absolute; bottom: 10px; left: 12px;
  display: flex; align-items:center; gap:5px;
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em;
  color: var(--muted); opacity: 0.5; z-index: 30;
  transition: opacity 0.3s;
  -webkit-app-region: no-drag;
  cursor: pointer;
}
#status-dot:hover { opacity: 1; }
.sdot {
  width: 6px; height: 6px; border-radius: 50%; background: #ff4466;
  transition: background 0.4s, box-shadow 0.4s;
}
.sdot.online { background: #4ade80; box-shadow: 0 0 6px #4ade80; }

/* Contador de memória */
#mem-counter {
  position: absolute; bottom: 10px; right: 12px;
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.08em;
  color: var(--muted); opacity: 0.45; z-index: 30;
  transition: opacity 0.3s;
  cursor: pointer;
  -webkit-app-region: no-drag;
}
#mem-counter:hover { opacity: 1; color: var(--violet); }

/* ── Painel de memória ──────────────────────────────────────────────────────── */
#mem-panel {
  position: absolute;
  inset: 0;
  z-index: 100;
  background: rgba(5, 2, 14, 0.96);
  backdrop-filter: blur(24px);
  display: flex;
  flex-direction: column;
  padding: 44px 16px 80px;
  gap: 10px;
  opacity: 0;
  pointer-events: none;
  transform: translateY(8px);
  transition: opacity 0.25s ease, transform 0.25s ease;
  -webkit-app-region: no-drag;
}
#mem-panel.show {
  opacity: 1;
  pointer-events: all;
  transform: translateY(0);
}

#mem-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}
#mem-panel-title {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--rose);
}
#mem-close {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  padding: 4px 10px;
  border-radius: 20px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
#mem-close:hover { border-color: var(--rose); color: var(--rose); }

#mem-search {
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 7px 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
  caret-color: var(--rose);
  user-select: text;
  -webkit-user-select: text;
}
#mem-search::placeholder { color: var(--muted); }
#mem-search:focus { border-color: rgba(167,139,250,0.4); }

#mem-stats {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.mem-stat {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--muted);
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px 8px;
}
.mem-stat span { color: var(--violet); }

#mem-list {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding-right: 4px;
}
#mem-list::-webkit-scrollbar { width: 3px; }
#mem-list::-webkit-scrollbar-track { background: transparent; }
#mem-list::-webkit-scrollbar-thumb { background: rgba(167,139,250,0.3); border-radius: 2px; }

.mem-entry {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(167,139,250,0.1);
  border-radius: 10px;
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.mem-meta {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.1em;
  color: rgba(167,139,250,0.5);
}
.mem-msg {
  font-size: 11px;
  line-height: 1.45;
  color: var(--muted);
}
.mem-msg.user { color: rgba(245,240,255,0.7); }
.mem-msg.luna { color: rgba(167,139,250,0.8); }
.mem-label {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.08em;
  margin-bottom: 2px;
}
.mem-label.u { color: var(--rose); }
.mem-label.l { color: var(--violet); }

#mem-empty {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
  text-align: center;
  padding: 24px 0;
}

/* ── Chat Input Bar ─────────────────────────────────────────────────── */
#chat-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 50;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(to top, rgba(10,4,22,0.92) 70%, transparent);
  -webkit-app-region: no-drag;
}

#chat-input {
  flex: 1;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 8px 16px;
  font-family: var(--font-ui);
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  caret-color: var(--rose);
  user-select: text;
  -webkit-user-select: text;
}
#chat-input::placeholder { color: var(--muted); }
#chat-input:focus {
  border-color: rgba(167,139,250,0.45);
  box-shadow: 0 0 0 3px rgba(167,139,250,0.12);
}

#send-btn, #mic-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.06);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.18s, border-color 0.18s, transform 0.12s;
  flex-shrink: 0;
}
#send-btn:hover { background: rgba(244,114,182,0.18); border-color: var(--rose); }
#send-btn:active { transform: scale(0.93); }
#send-btn svg { stroke: var(--rose); }

#mic-btn:hover { background: rgba(167,139,250,0.18); border-color: var(--violet); }
#mic-btn:active { transform: scale(0.93); }
#mic-btn svg { stroke: var(--violet); }
#mic-btn.recording {
  background: rgba(244,114,182,0.25);
  border-color: var(--rose);
  animation: mic-pulse 1s ease-in-out infinite;
}
#mic-btn.recording svg { stroke: var(--rose); }
@keyframes mic-pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(244,114,182,0.4); }
  50%      { box-shadow: 0 0 0 6px rgba(244,114,182,0); }
}
</style>
</head>
<body>
<div id="app">
  <div id="canvas-wrap">
    <canvas id="particles-canvas"></canvas>
    <canvas id="three-canvas"></canvas>

    <div id="loader">
      <div class="loader-ring"></div>
      <div id="load-text">acordando luna...</div>
      <div id="load-bar-wrap"><div id="load-bar"></div></div>
    </div>

    <div id="thinking">
      <div class="td"></div><div class="td"></div><div class="td"></div>
      <span style="font-size:11px;margin-left:4px;font-family:var(--font-mono)" id="thinking-label">pensando</span>
    </div>

    <div id="listen-hud">
      <div class="hud-bars">
        <div class="hb"></div><div class="hb"></div><div class="hb"></div>
        <div class="hb"></div><div class="hb"></div>
      </div>
      <div class="hud-spin">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
        </svg>
      </div>
      <span id="hud-label">ouvindo</span>
    </div>

    <div id="bubble"></div>
    <div id="emo-tag"></div>
  </div>

  <!-- Painel de memória permanente -->
  <div id="mem-panel">
    <div id="mem-panel-header">
      <div id="mem-panel-title">📖 memória permanente</div>
      <button id="mem-close">fechar</button>
    </div>
    <div id="mem-stats"></div>
    <input id="mem-search" type="text" placeholder="buscar nas conversas..." autocomplete="off" spellcheck="false"/>
    <div id="mem-list"><div id="mem-empty">carregando...</div></div>
  </div>

  <!-- Status -->
  <div id="status-dot">
    <div class="sdot" id="sdot"></div>
    <span id="sdot-label">offline</span>
  </div>

  <!-- Contador de conversas salvas -->
  <div id="mem-counter" title="Ver memória permanente">
    <span id="mem-count">0</span> conversas
  </div>

  <!-- Chat Input Bar -->
  <div id="chat-bar">
    <input id="chat-input" type="text" placeholder="fala comigo..." autocomplete="off" spellcheck="false"/>
    <button id="send-btn" title="Enviar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
    <button id="mic-btn" title="Segurar para gravar (ou clique para alternar)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="11" rx="3"/>
        <path d="M19 10a7 7 0 0 1-14 0"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
  </div>

  <div id="drag"></div>
  <div id="win-btns">
    <button class="wb-btn wb-close" onclick="window.electronAPI?.close()"></button>
    <button class="wb-btn wb-mini"  onclick="window.electronAPI?.minimize()"></button>
    <button class="wb-btn wb-max"   onclick="window.electronAPI?.toggleSize()"></button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@0.6.7/lib/three-vrm.js"></script>

<script>
const API = 'http://127.0.0.1:8000';

const canvasEl      = document.getElementById('three-canvas');
const loaderEl      = document.getElementById('loader');
const loadTextEl    = document.getElementById('load-text');
const loadBarEl     = document.getElementById('load-bar');
const bubbleEl      = document.getElementById('bubble');
const thinkingEl    = document.getElementById('thinking');
const thinkingLabel = document.getElementById('thinking-label');
const listenHud     = document.getElementById('listen-hud');
const hudLabel      = document.getElementById('hud-label');
const emoTagEl      = document.getElementById('emo-tag');
const sdotEl        = document.getElementById('sdot');
const sdotLabel     = document.getElementById('sdot-label');
const particlesCv   = document.getElementById('particles-canvas');
const chatInput     = document.getElementById('chat-input');
const sendBtn       = document.getElementById('send-btn');
const micBtn        = document.getElementById('mic-btn');
const memCounter    = document.getElementById('mem-counter');
const memCount      = document.getElementById('mem-count');
const memPanel      = document.getElementById('mem-panel');
const memClose      = document.getElementById('mem-close');
const memSearch     = document.getElementById('mem-search');
const memList       = document.getElementById('mem-list');
const memStats      = document.getElementById('mem-stats');

// ── Three.js ──────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({
  canvas: canvasEl, antialias: true, alpha: true,
  powerPreference: 'high-performance'
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearAlpha(0);
renderer.outputEncoding = THREE.LinearEncoding;
renderer.toneMapping    = THREE.NoToneMapping;
renderer.shadowMap.enabled = false;

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(14, 1, 0.05, 30);
camera.position.set(-0.02, 0.54, 4.39);
camera.lookAt(0, 0.22, 0);

scene.add(new THREE.AmbientLight(0xffeeff, 0.55));
const keyLight  = new THREE.DirectionalLight(0xffb3d9, 1.4); keyLight.position.set(0.8, 2.2, 2.0);  scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xb8aaff, 0.7); fillLight.position.set(-1.2,1.5,1.0);  scene.add(fillLight);
const rimLight  = new THREE.DirectionalLight(0x9f7aea, 0.5); rimLight.position.set(0,1.8,-2.0);     scene.add(rimLight);
const topLight  = new THREE.DirectionalLight(0xffffff, 0.3); topLight.position.set(0,4,0);           scene.add(topLight);

function onResize() {
  const w = canvasEl.parentElement.clientWidth, h = canvasEl.parentElement.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h; camera.updateProjectionMatrix();
  particlesCv.width = w; particlesCv.height = h;
}
window.addEventListener('resize', onResize); onResize();

// ── Partículas ─────────────────────────────────────────────────────────────────
const pctx = particlesCv.getContext('2d');
const particles = Array.from({ length: 60 }, () => ({
  x: Math.random(), y: Math.random(),
  r: 0.5 + Math.random() * 1.8,
  vx: (Math.random() - 0.5) * 0.00012,
  vy: -(0.00008 + Math.random() * 0.00012),
  alpha: 0.15 + Math.random() * 0.4,
  hue: Math.random() < 0.5 ? 300 : 255,
}));
function drawParticles(t) {
  const W = particlesCv.width, H = particlesCv.height;
  pctx.clearRect(0,0,W,H);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    if (p.y < -0.02) { p.y = 1.02; p.x = Math.random(); }
    if (p.x < -0.02) p.x = 1.02; if (p.x > 1.02) p.x = -0.02;
    const pulsed = p.alpha * (0.7 + 0.3 * Math.sin(t * 1.5 + p.x * 10));
    pctx.beginPath(); pctx.arc(p.x * W, p.y * H, p.r, 0, Math.PI * 2);
    pctx.fillStyle = `hsla(${p.hue}, 80%, 75%, ${pulsed})`; pctx.fill();
  }
}

// ── VRM ────────────────────────────────────────────────────────────────────────
let vrm = null, VRM_KEYS = {};
const clock = new THREE.Clock();
const mouse = { x: 0, y: 0, lastMove: 0 };
window.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = (e.clientY / window.innerHeight) * -2 + 1;
  mouse.lastMove = clock.elapsedTime;
});

const SM = {
  headYTarget:0,headYCurrent:0,headXTarget:0,headXCurrent:0,headZTarget:0,headZCurrent:0,
  idleX:0,idleY:0,nextIdle:0,
  blinkTimer:0,blinkState:0,blinkProgress:0,
  breathPhase:0,breathIntensity:1.0,breathTarget:1.0,
  swayPhase:0,
  laZCurrent:0,laZTarget:0,raZCurrent:0,raZTarget:0,
  bobPhase:0,
  emotionType:'neutral',emotionValue:0,emotionTarget:0,emotionTimer:0,
  talking:false,talkPhase:0,mouthValue:0,
  bounceActive:false,bounceTime:0,
  camSway:0,
  _camBaseX:-0.02,_camBaseY:0.54,_camBaseZ:4.39,_camLookY:0.22,
};

const lerp   = (a,b,t)=>a+(b-a)*t;
const clamp  = (v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const smooth = (cur,tgt,spd,dt)=>lerp(cur,tgt,1-Math.exp(-spd*dt));

function setBS(key,val){ if(!key||!vrm)return; try{vrm.blendShapeProxy.setValue(key,clamp(val,0,1));}catch{} }
function getBone(name){ if(!vrm)return null; return vrm.humanoid.getBoneNode(name); }

function discoverBlendShapes(proxy) {
  const all = Object.keys(proxy._blendShapeGroups||{});
  const find = (...pats) => all.find(k=>pats.some(p=>p.test(k)))||null;
  return {
    blink:    find(/^blink$/i,/blink_l/i,/blinkleft/i),
    mouthA:   find(/^a$/i,/^aa$/i,/mouth.*a/i),
    mouthI:   find(/^i$/i,/^ii$/i,/mouth.*i/i),
    mouthO:   find(/^o$/i,/^oh$/i,/mouth.*o/i),
    joy:      find(/joy/i,/happy/i,/smile/i),
    angry:    find(/angry/i,/anger/i),
    sorrow:   find(/sorrow/i,/sad/i),
    surprise: find(/surpris/i,/wow/i,/shock/i),
    brows:    find(/browUp/i,/browRaise/i),
  };
}

const gltfLoader = new THREE.GLTFLoader();
gltfLoader.load(`${API}/assets/luna.vrm`,
  (gltf) => {
    THREE_VRM.VRM.from(gltf).then(v => {
      vrm = v; scene.add(vrm.scene); vrm.scene.rotation.y = Math.PI;
      VRM_KEYS = discoverBlendShapes(vrm.blendShapeProxy);
      SM.laZTarget = SM.laZCurrent = 1.3;
      SM.raZTarget = SM.raZCurrent = -1.3;
      loaderEl.classList.add('hidden');
      setTimeout(() => loaderEl.style.display='none', 800);
      setTimeout(() => {
        showBubble('Oi~ Finalmente você me acordou! 😤');
        setEmotion('joy',4); triggerBounce();
      }, 300);
    }).catch(() => {
      loadTextEl.textContent='❌ Erro ao processar VRM';
      loadTextEl.style.color='#ff6b6b';
    });
  },
  (prog) => {
    if(prog.total>0){
      const pct=Math.round(prog.loaded/prog.total*100);
      loadTextEl.textContent=`CARREGANDO LUNA... ${pct}%`;
      loadBarEl.style.width=pct+'%';
    }
  },
  () => {
    loadTextEl.textContent='❌ luna.vrm não encontrado';
    loadTextEl.style.color='#ff6b6b';
  }
);

// ── Loop de animação ───────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t  = clock.elapsedTime;
  drawParticles(t);
  if (!vrm) { renderer.render(scene,camera); return; }

  const timeSinceMove = t - mouse.lastMove;
  if (timeSinceMove < 6.0) {
    SM.headYTarget = mouse.x*0.75; SM.headXTarget = mouse.y*0.55; SM.headZTarget = -mouse.x*0.18;
  } else {
    if (t > SM.nextIdle) {
      const p = Math.floor(Math.random()*5);
      const px=[0,-0.3,0.35,0.1,-0.1], py=[0,0.1,0.05,-0.2,0.2];
      SM.idleX=px[p]; SM.idleY=py[p]; SM.nextIdle=t+2.2+Math.random()*3.8;
    }
    SM.headYTarget=SM.idleX; SM.headXTarget=SM.idleY; SM.headZTarget=-SM.idleX*0.08;
  }
  const hSpd = SM.talking?6:4;
  SM.headYCurrent=smooth(SM.headYCurrent,SM.headYTarget,hSpd,dt);
  SM.headXCurrent=smooth(SM.headXCurrent,SM.headXTarget,hSpd,dt);
  SM.headZCurrent=smooth(SM.headZCurrent,SM.headZTarget,hSpd,dt);
  const head=getBone('head'), neck=getBone('neck');
  if(head&&neck){
    const hY=SM.headYCurrent*(Math.PI/5.5), hX=SM.headXCurrent*(Math.PI/9), hZ=SM.headZCurrent*(Math.PI/14);
    head.rotation.y=hY; head.rotation.x=hX; head.rotation.z=hZ;
    neck.rotation.y=hY*0.4; neck.rotation.x=hX*0.4; neck.rotation.z=hZ*0.2;
  }

  SM.blinkTimer+=dt;
  if(SM.blinkState===0&&SM.blinkTimer>2.8+Math.random()*3.2){ SM.blinkState=1; SM.blinkProgress=0; SM.blinkTimer=0; }
  if(SM.blinkState>0){
    SM.blinkProgress+=dt;
    const CD=0.065,HD=0.03,OD=0.085;
    if(SM.blinkState===1){ const p=clamp(SM.blinkProgress/CD,0,1); setBS(VRM_KEYS.blink,p*p); if(SM.blinkProgress>=CD){SM.blinkState=2;SM.blinkProgress=0;} }
    else if(SM.blinkState===2){ setBS(VRM_KEYS.blink,1); if(SM.blinkProgress>=HD){SM.blinkState=3;SM.blinkProgress=0;} }
    else if(SM.blinkState===3){ const p=clamp(SM.blinkProgress/OD,0,1); setBS(VRM_KEYS.blink,1-p*p); if(SM.blinkProgress>=OD){ setBS(VRM_KEYS.blink,0); SM.blinkState=0; if(Math.random()<0.25)setTimeout(()=>{if(!vrm)return;SM.blinkState=1;SM.blinkProgress=0;},160); } }
  }

  SM.breathTarget=SM.talking?1.8:1.0;
  SM.breathIntensity=smooth(SM.breathIntensity,SM.breathTarget,2,dt);
  SM.breathPhase+=dt*1.3;
  const bv=Math.sin(SM.breathPhase)*0.011*SM.breathIntensity;
  const chest=getBone('chest'),spine=getBone('spine'),upperChest=getBone('upperChest');
  if(chest)chest.rotation.x=bv; if(upperChest)upperChest.rotation.x=bv*0.6; if(spine)spine.rotation.x=bv*0.5;

  SM.bobPhase+=dt*0.55;
  SM.swayPhase+=dt*0.45;
  const swayZ=Math.sin(SM.swayPhase)*0.016, swayX=Math.cos(SM.swayPhase*0.7)*0.004;
  const hips=getBone('hips');
  if(hips){
    hips.rotation.z=lerp(hips.rotation.z,swayZ,0.025);
    hips.rotation.y=lerp(hips.rotation.y,Math.sin(SM.swayPhase*0.35)*0.006,0.02);
    hips.rotation.x=lerp(hips.rotation.x,swayX,0.02);
    if(!SM.bounceActive)hips.position.y=lerp(hips.position.y,Math.sin(SM.bobPhase)*0.003,0.04);
  }

  if(SM.bounceActive){
    SM.bounceTime+=dt;
    const by=0.04*Math.sin(16*SM.bounceTime)*Math.exp(-5.5*SM.bounceTime);
    if(hips)hips.position.y=by;
    if(SM.bounceTime>0.9){SM.bounceActive=false;if(hips)hips.position.y=0;}
  }

  const la=getBone('leftUpperArm'),ra=getBone('rightUpperArm');
  const armMicro=Math.sin(SM.swayPhase*0.45)*0.006;
  SM.laZTarget=1.28+armMicro; SM.raZTarget=-1.28-armMicro;
  SM.laZCurrent=smooth(SM.laZCurrent,SM.laZTarget,2.5,dt);
  SM.raZCurrent=smooth(SM.raZCurrent,SM.raZTarget,2.5,dt);
  if(la){la.rotation.z=SM.laZCurrent; la.rotation.x=0;}
  if(ra){ra.rotation.z=SM.raZCurrent; ra.rotation.x=0;}

  const lfa=getBone('leftLowerArm'),rfa=getBone('rightLowerArm');
  const lh=getBone('leftHand'),rh=getBone('rightHand');
  if(lfa)lfa.rotation.z=smooth(lfa.rotation.z,0,3,dt); if(rfa)rfa.rotation.z=smooth(rfa.rotation.z,0,3,dt);
  if(lh)lh.rotation.z=smooth(lh.rotation.z,0,3,dt);   if(rh)rh.rotation.z=smooth(rh.rotation.z,0,3,dt);

  const ll=getBone('leftUpperLeg'),rl=getBone('rightUpperLeg');
  const lkn=getBone('leftLowerLeg'),rkn=getBone('rightLowerLeg');
  const lft=getBone('leftFoot'),rft=getBone('rightFoot');
  const legOsc=Math.sin(SM.swayPhase*0.5)*0.01;
  if(ll)ll.rotation.z=smooth(ll.rotation.z,0.05+legOsc,3,dt);
  if(rl)rl.rotation.z=smooth(rl.rotation.z,-0.05-legOsc,3,dt);
  if(lkn)lkn.rotation.x=smooth(lkn.rotation.x,-0.035+legOsc*0.4,3,dt);
  if(rkn)rkn.rotation.x=smooth(rkn.rotation.x,-0.035-legOsc*0.4,3,dt);
  if(lft)lft.rotation.x=smooth(lft.rotation.x,Math.sin(SM.swayPhase*0.55)*0.006,3,dt);
  if(rft)rft.rotation.x=smooth(rft.rotation.x,-Math.sin(SM.swayPhase*0.55)*0.006,3,dt);

  if(SM.talking){
    SM.talkPhase+=dt;
    const raw=(Math.sin(SM.talkPhase*11)*0.40+Math.sin(SM.talkPhase*6.5+1.4)*0.30+Math.sin(SM.talkPhase*17+0.7)*0.18+0.12);
    SM.mouthValue=smooth(SM.mouthValue,clamp(raw,0,0.88),18,dt);
    const iAmt=clamp(Math.sin(SM.talkPhase*4)*0.3,0,0.25);
    setBS(VRM_KEYS.mouthA,SM.mouthValue*(1-iAmt));
    setBS(VRM_KEYS.mouthI,SM.mouthValue*iAmt);
    if(VRM_KEYS.mouthO)setBS(VRM_KEYS.mouthO,clamp(Math.sin(SM.talkPhase*3.1)*0.15,0,0.2));
  } else {
    SM.mouthValue=smooth(SM.mouthValue,0,16,dt);
    setBS(VRM_KEYS.mouthA,SM.mouthValue);
    setBS(VRM_KEYS.mouthI,0);
    if(VRM_KEYS.mouthO)setBS(VRM_KEYS.mouthO,0);
  }

  if(SM.emotionTimer>0){ SM.emotionTimer-=dt; SM.emotionValue=smooth(SM.emotionValue,SM.emotionTarget,3,dt); if(SM.emotionTimer<=0)SM.emotionTarget=0; }
  else SM.emotionValue=smooth(SM.emotionValue,0,2,dt);
  ['joy','angry','sorrow','surprise'].forEach(k=>{ if(VRM_KEYS[k]&&k!==SM.emotionType)setBS(VRM_KEYS[k],0); });
  if(VRM_KEYS[SM.emotionType])setBS(VRM_KEYS[SM.emotionType],SM.emotionValue);
  if(VRM_KEYS.brows&&(SM.emotionType==='surprise'||SM.emotionType==='joy'))setBS(VRM_KEYS.brows,SM.emotionValue*0.6);

  SM.camSway+=dt*0.22;
  camera.position.y=SM._camBaseY+Math.sin(SM.camSway)*0.003;
  camera.position.x=SM._camBaseX+Math.sin(SM.camSway*0.7)*0.002;
  camera.lookAt(SM._camBaseX,SM._camLookY,0);

  vrm.update(dt);
  renderer.render(scene,camera);
}
animate();

// ── Helpers ────────────────────────────────────────────────────────────────────
function triggerBounce(){ SM.bounceActive=true; SM.bounceTime=0; }
function setEmotion(type,duration=3.5){
  SM.emotionType=type; SM.emotionTimer=duration; SM.emotionTarget=1.0;
  const emojis={joy:'😊 joy',angry:'😤 angry',sorrow:'😢 sorrow',surprise:'😱 surprise',neutral:''};
  if(emojis[type]){ emoTagEl.textContent=emojis[type]; emoTagEl.classList.add('show'); setTimeout(()=>emoTagEl.classList.remove('show'),(duration+0.5)*1000); }
}
function startTalking(){ SM.talking=true; SM.talkPhase=0; triggerBounce(); }
function stopTalking(){ SM.talking=false; }
function detectEmotion(text){
  const t=text.toLowerCase();
  if(/😂|kkk|ahahah|rs+|engraç|piada|fofinho/.test(t)) return 'joy';
  if(/😤|raiva|odeio|irritan|caramba/.test(t))          return 'angry';
  if(/😢|triste|saudad|tô mal/.test(t))                 return 'sorrow';
  if(/😱|nossa|uau|carai|incrível|wow/.test(t))         return 'surprise';
  if(/❤|amo|obrigad|valeu|top/.test(t))                 return 'joy';
  return 'neutral';
}

// ── UI ─────────────────────────────────────────────────────────────────────────
let bubbleTimer;

function showBubble(text){
  clearTimeout(bubbleTimer);
  while(bubbleEl.firstChild) bubbleEl.removeChild(bubbleEl.firstChild);
  bubbleEl.appendChild(document.createTextNode(text));
  bubbleEl.classList.add('show');
  bubbleTimer=setTimeout(()=>bubbleEl.classList.remove('show'), Math.max(4500, Math.min(9000, text.length*65)));
}

function showThinking(on, label='pensando'){
  thinkingLabel.textContent=label;
  thinkingEl.classList.toggle('show',on);
  if(on) bubbleEl.classList.remove('show');
}

function setHud(state) {
  listenHud.classList.remove('recording','processing');
  if(state==='off'){ listenHud.classList.remove('show'); return; }
  listenHud.classList.add('show', state);
  hudLabel.textContent = state==='recording' ? 'ouvindo' : 'processando';
}

// ── Voz ────────────────────────────────────────────────────────────────────────
let _audioAtual = null;
async function tocarVoz() {
  await new Promise(r => setTimeout(r, 400));
  try {
    const resp = await fetch(`${API}/audio`, { cache: 'no-store' });
    if (!resp.ok) return;
    const url = URL.createObjectURL(await resp.blob());
    if (_audioAtual) { _audioAtual.pause(); URL.revokeObjectURL(_audioAtual.src); }
    _audioAtual = new Audio(url);
    _audioAtual.onplay  = () => { SM.talking=true; SM.talkPhase=0; };
    _audioAtual.onended = () => { URL.revokeObjectURL(url); stopTalking(); };
    _audioAtual.onerror = () => stopTalking();
    await _audioAtual.play();
  } catch { stopTalking(); }
}

// ── Chat ────────────────────────────────────────────────────────────────────────
let busy = false;

async function sendMsg(text){
  if(!text.trim()||busy) return;
  busy=true;
  bubbleEl.classList.remove('show');
  showThinking(true,'pensando');
  try{
    const res=await fetch(`${API}/chat`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({mensagem:text}),
      signal:AbortSignal.timeout(20000),
    });
    showThinking(false);
    if(!res.ok){ const e=await res.json().catch(()=>({})); showBubble(`❌ ${e.detail||'Erro no servidor'}`); setEmotion('sorrow',2.5); return; }
    const data=await res.json();
    const resposta=data.resposta||'(sem resposta)';
    showBubble(resposta);
    const emo=detectEmotion(resposta); if(emo!=='neutral') setEmotion(emo,4.5);
    if(data.tem_audio) tocarVoz();
    // Atualiza contador de memória
    memCount.textContent = data.historico_total || memCount.textContent;
    atualizarContador();
  } catch(err){
    showThinking(false);
    showBubble(err.name==='TimeoutError'?'Ué, demorou demais... 😴':'Backend offline!');
    setEmotion('sorrow',3);
  } finally{
    busy=false;
  }
}

// ── Painel de memória permanente ───────────────────────────────────────────────

let todasConversas = [];

async function atualizarContador() {
  try {
    const r = await fetch(`${API}/historico/stats`);
    if (!r.ok) return;
    const d = await r.json();
    memCount.textContent = d.total || 0;
  } catch {}
}

async function carregarMemoria(query = '') {
  memList.innerHTML = '<div id="mem-empty">carregando...</div>';
  try {
    let url = query
      ? `${API}/historico/buscar?q=${encodeURIComponent(query)}`
      : `${API}/historico?ultimas=80`;
    const r = await fetch(url);
    if (!r.ok) throw new Error();
    const d = await r.json();

    const lista = query ? d.resultados : d.conversas;
    const stats = query ? null : d.estatisticas;

    // Atualiza stats
    if (stats) {
      memStats.innerHTML = `
        <div class="mem-stat">total: <span>${stats.total}</span></div>
        <div class="mem-stat">dias: <span>${stats.dias_ativos}</span></div>
        ${stats.primeira ? `<div class="mem-stat">desde: <span>${stats.primeira.split(' ')[0]}</span></div>` : ''}
      `;
      memCount.textContent = stats.total;
    }

    if (!lista || lista.length === 0) {
      memList.innerHTML = `<div id="mem-empty">${query ? 'nenhum resultado para "'+query+'"' : 'nenhuma conversa salva ainda'}</div>`;
      return;
    }

    // Renderiza do mais recente pro mais antigo
    memList.innerHTML = '';
    const invertida = [...lista].reverse();
    for (const m of invertida) {
      const el = document.createElement('div');
      el.className = 'mem-entry';
      el.innerHTML = `
        <div class="mem-meta">#${m.id || '?'} · ${m.data || ''} ${m.hora || ''}</div>
        <div class="mem-label u">você</div>
        <div class="mem-msg user">${escapeHtml(m.usuario)}</div>
        <div class="mem-label l" style="margin-top:4px">luna</div>
        <div class="mem-msg luna">${escapeHtml(m.luna)}</div>
      `;
      memList.appendChild(el);
    }
  } catch {
    memList.innerHTML = '<div id="mem-empty">erro ao carregar conversas</div>';
  }
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Microfone ──────────────────────────────────────────────────────────────────
let mediaRecorder=null, audioChunks=[], micStream=null, isRecording=false;

async function getMicStream(){
  if(micStream&&micStream.active) return micStream;
  try{
    micStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    return micStream;
  }catch{
    showBubble('Preciso de permissão pro microfone! 🎙️');
    return null;
  }
}

async function startRecording(){
  if(isRecording||busy) return;
  const stream=await getMicStream();
  if(!stream) return;
  const mimeType=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4']
    .find(m=>MediaRecorder.isTypeSupported(m))||'';
  audioChunks=[];
  mediaRecorder=new MediaRecorder(stream, mimeType?{mimeType}:{});
  mediaRecorder.ondataavailable=e=>{ if(e.data.size>0) audioChunks.push(e.data); };
  mediaRecorder.onstop=async()=>{
    setHud('processing');
    micBtn.classList.remove('recording');
    showThinking(true,'transcrevendo');
    const blob=new Blob(audioChunks,{type:mediaRecorder.mimeType||'audio/webm'});
    const ext=(mediaRecorder.mimeType||'audio/webm').split(';')[0].split('/')[1]||'webm';
    const formData=new FormData();
    formData.append('audio',blob,`audio.${ext}`);
    try{
      const res=await fetch(`${API}/transcrever`,{
        method:'POST', body:formData,
        signal:AbortSignal.timeout(15000),
      });
      showThinking(false);
      setHud('off');
      if(!res.ok){ const e=await res.json().catch(()=>({})); showBubble(`❌ ${e.detail||'Erro na transcrição'}`); return; }
      const{texto}=await res.json();
      if(texto) sendMsg(texto);
      else showBubble('Não entendi bem... tenta de novo? 😅');
    }catch(err){
      showThinking(false); setHud('off');
      showBubble(err.name==='TimeoutError'?'Transcrição demorou demais 😴':'Erro ao transcrever o áudio');
    }
  };
  mediaRecorder.start(100);
  isRecording=true;
  micBtn.classList.add('recording');
  setHud('recording');
}

function stopRecording(){
  if(!isRecording||!mediaRecorder) return;
  isRecording=false;
  micBtn.classList.remove('recording');
  if(mediaRecorder.state!=='inactive') mediaRecorder.stop();
}

micBtn.addEventListener('click', () => {
  if(isRecording) stopRecording();
  else startRecording();
});

if(window.electronAPI){
  window.electronAPI.onPttStart(()=>startRecording());
  window.electronAPI.onPttStop(()=>{ stopRecording(); window.electronAPI.pttKeyUp(); });
}

// ── Wake Word ──────────────────────────────────────────────────────────────────
let _wakeAtivo=false;
function tocarBip(){
  try{
    const c=new AudioContext(),o=c.createOscillator(),g=c.createGain();
    o.connect(g); g.connect(c.destination);
    o.frequency.setValueAtTime(880,c.currentTime);
    o.frequency.setValueAtTime(1100,c.currentTime+0.08);
    g.gain.setValueAtTime(0.18,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.25);
    o.start(); o.stop(c.currentTime+0.25);
  }catch{}
}
async function checkWake(){
  try{
    const r=await fetch(`${API}/wake`,{signal:AbortSignal.timeout(2000)});
    if(!r.ok) return;
    const{ativado}=await r.json();
    if(ativado&&!_wakeAtivo&&!busy){
      _wakeAtivo=true; tocarBip();
      showBubble('🎙️ ouvindo...');
      await startRecording();
      setTimeout(()=>{ stopRecording(); _wakeAtivo=false; },5000);
    }
  }catch{}
}
setInterval(checkWake,1000);

// ── Status ─────────────────────────────────────────────────────────────────────
async function checkStatus(){
  try{
    const res=await fetch(`${API}/status`,{signal:AbortSignal.timeout(3000)});
    if(res.ok){
      sdotEl.classList.add('online');
      sdotLabel.textContent='online';
      const d = await res.json();
      if(d.total_conversas !== undefined) memCount.textContent = d.total_conversas;
      return;
    }
  }catch{}
  sdotEl.classList.remove('online'); sdotLabel.textContent='offline';
}
checkStatus(); setInterval(checkStatus,15000);
</script>
</body>
</html>
